# /etc/wsl.conf
#
# Disable automatic Windows PATH inheritance — by default WSL injects the
# entire Windows %PATH% into Linux $PATH, which is slow and noisy.
# Specific Windows binaries we actually use (e.g. VS Code's `code`) are
# re-added per-shell in ~/.zshrc / ~/.bashrc.
#
# Apply with:  sudo cp etc/wsl.conf /etc/wsl.conf  &&  wsl.exe --shutdown

[interop]
appendWindowsPath = false
